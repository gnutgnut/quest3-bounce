<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bouncy Ball VR</title>
  <style>
    body {
      margin: 0;
      background: #000;
      overflow: hidden;
      font-family: system-ui, sans-serif;
    }
    canvas { display: block; }
    #info {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 14px;
      opacity: 0.6;
      pointer-events: none;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="info">Click to enable audio — Enter VR on Quest 3</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
